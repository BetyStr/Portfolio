{% extends "base.html" %}
{% block content %}
<div class="space-y-12">
    <div class="text-center space-y-4">
        <h2 class="text-4xl font-bold text-white">The AI Arcade</h2>
        <p class="text-gray-400">Classic games with a modern twist. Your scores are saved to Supabase.</p>
    </div>

    <div class="grid lg:grid-cols-3 gap-8">
        <!-- Game Display -->
        <div class="lg:col-span-2 space-y-6">
            <div class="glass rounded-3xl overflow-hidden aspect-video relative group">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent opacity-100 transition-opacity group-hover:opacity-0 flex items-center justify-center pointer-events-none">
                    <div class="text-center">
                        <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse">
                            <svg class="w-10 h-10 text-white fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                        <p class="text-xl font-bold">Select a game to start</p>
                    </div>
                </div>
                <iframe id="game-frame" src="" class="w-full h-full border-none" title="Arcade Game"></iframe>
            </div>
            
            <div class="flex gap-4">
                <button onclick="document.getElementById('game-frame').src='/static/arcade/snake.html'" 
                        class="flex-1 glass p-6 rounded-2xl hover:border-blue-500/50 transition-all text-left group">
                    <h4 class="font-bold text-lg mb-1 group-hover:text-blue-400 transition-colors">Snake AI</h4>
                    <p class="text-sm text-gray-500">Classic snake game with score tracking.</p>
                </button>
                <button onclick="document.getElementById('game-frame').src='/static/arcade/tetris.html'" 
                        class="flex-1 glass p-6 rounded-2xl hover:border-purple-500/50 transition-all text-left group">
                    <h4 class="font-bold text-lg mb-1 group-hover:text-purple-400 transition-colors">Tetris AI</h4>
                    <p class="text-sm text-gray-500">Traditional tetris placeholder.</p>
                </button>
            </div>
        </div>

        <!-- Leaderboard -->
        <div class="glass rounded-3xl p-8 space-y-6">
            <h3 class="text-2xl font-bold flex items-center gap-2">
                <svg class="w-6 h-6 text-yellow-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1L9 9l-8 1 6 6-2 8 7-4 7 4-2-8 6-6-8-1-3-8z"/></svg>
                Leaderboard
            </h3>
            
            <div class="space-y-4">
                <!-- Mock scores for now -->
                <div class="flex items-center justify-between p-4 bg-white/5 rounded-xl border border-white/5">
                    <div class="flex items-center gap-3">
                        <span class="text-lg font-bold text-yellow-500">1</span>
                        <div class="w-8 h-8 bg-gradient-to-tr from-orange-400 to-red-500 rounded-lg"></div>
                        <span class="font-medium">CyberKnight</span>
                    </div>
                    <span class="font-bold">12,450</span>
                </div>
                <div class="flex items-center justify-between p-4 bg-white/5 rounded-xl border border-white/5">
                    <div class="flex items-center gap-3">
                        <span class="text-lg font-bold text-gray-400">2</span>
                        <div class="w-8 h-8 bg-gradient-to-tr from-blue-400 to-indigo-500 rounded-lg"></div>
                        <span class="font-medium">NeoCoder</span>
                    </div>
                    <span class="font-bold">10,200</span>
                </div>
                <div class="flex items-center justify-between p-4 bg-white/5 rounded-xl border border-white/5">
                    <div class="flex items-center gap-3">
                        <span class="text-lg font-bold text-amber-700">3</span>
                        <div class="w-8 h-8 bg-gradient-to-tr from-green-400 to-emerald-500 rounded-lg"></div>
                        <span class="font-medium">AI_Whisperer</span>
                    </div>
                    <span class="font-bold">9,850</span>
                </div>
            </div>
            
            <button class="w-full py-4 rounded-xl border border-white/10 hover:bg-white/5 transition-all text-sm font-medium">
                View All Scores
            </button>
        </div>
    </div>
</div>
{% endblock %}
