<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Portfolio | Premium Experience</title>
    <meta name="description" content="A state-of-the-art AI portfolio showcasing LLM capabilities, semantic search, and interactive games.">
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.11"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #030712;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.1) 0, transparent 50%);
        }
        h1, h2, h3, .font-heading {
            font-family: 'Outfit', sans-serif;
        }
        .glass {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-link {
            position: relative;
            transition: all 0.3s ease;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: #3b82f6;
            transition: width 0.3s ease;
        }
        .nav-link:hover::after {
            width: 100%;
        }
    </style>
</head>
<body class="text-gray-200 min-h-screen">
    <nav class="sticky top-0 z-50 glass border-b border-white/5 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 group cursor-pointer" hx-get="/" hx-target="#main-content" hx-push-url="true">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20 group-hover:scale-110 transition-transform">
                    <span class="text-xl font-bold text-white">A</span>
                </div>
                <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">AI Portfolio</h1>
            </div>
            
            <div class="hidden md:flex space-x-8 font-medium">
                <a href="/" hx-get="/" hx-target="#main-content" hx-push-url="true" class="nav-link hover:text-white">Home</a>
                <a href="/jailbreak" hx-get="/jailbreak" hx-target="#main-content" hx-push-url="true" class="nav-link hover:text-white">Jailbreak</a>
                <a href="/arcade" hx-get="/arcade" hx-target="#main-content" hx-push-url="true" class="nav-link hover:text-white">Arcade</a>
            </div>
            
            <button class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-full font-semibold transition-all shadow-lg shadow-blue-600/20 active:scale-95">
                Connect
            </button>
        </div>
    </nav>
    
    <main id="main-content" class="max-w-7xl mx-auto p-6 md:p-12 animate-in fade-in duration-700">
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-20 border-t border-white/5 py-12 px-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center opacity-50 text-sm">
            <p>&copy; 2024 AI Portfolio. Built with FastAPI, HTMX & Tailwind.</p>
            <div class="flex gap-6 mt-4 md:mt-0">
                <a href="#" class="hover:text-white transition-colors">Twitter</a>
                <a href="#" class="hover:text-white transition-colors">GitHub</a>
                <a href="#" class="hover:text-white transition-colors">LinkedIn</a>
            </div>
        </div>
    </footer>
</body>
</html>
