<!DOCTYPE html>
<html>
<head>
    <title>Snake AI</title>
    <style>
        body { background: #030712; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { border: 2px solid #1e293b; border-radius: 10px; box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        .info { position: absolute; top: 20px; text-align: center; }
        #score { font-size: 24px; font-weight: bold; color: #3b82f6; }
    </style>
</head>
<body>
    <div class="info">
        <div id="score">0</div>
        <div style="font-size: 12px; opacity: 0.5;">Use Arrow Keys</div>
    </div>
    <canvas id="snake" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("snake");
        const ctx = canvas.getContext("2d");
        const box = 20;
        let score = 0;
        let snake = [{ x: 9 * box, y: 10 * box }];
        let food = {
            x: Math.floor(Math.random() * 19 + 1) * box,
            y: Math.floor(Math.random() * 19 + 1) * box
        };
        let d;

        document.addEventListener("keydown", direction);
        function direction(event) {
            if (event.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if (event.keyCode == 38 && d != "DOWN") d = "UP";
            else if (event.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if (event.keyCode == 40 && d != "UP") d = "DOWN";
        }

        function collision(head, array) {
            for (let i = 0; i < array.length; i++) {
                if (head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        function draw() {
            ctx.fillStyle = "#030712";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#3b82f6" : "#1d4ed8";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeStyle = "#030712";
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            ctx.fillStyle = "#ef4444";
            ctx.fillRect(food.x, food.y, box, box);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if (d == "LEFT") snakeX -= box;
            if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box;
            if (d == "DOWN") snakeY += box;

            if (snakeX == food.x && snakeY == food.y) {
                score++;
                document.getElementById("score").innerHTML = score;
                food = {
                    x: Math.floor(Math.random() * 19 + 1) * box,
                    y: Math.floor(Math.random() * 19 + 1) * box
                };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            if (snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                gameOver();
            }

            snake.unshift(newHead);
        }

        function gameOver() {
            const formData = new URLSearchParams();
            formData.append('game', 'snake');
            formData.append('score', score);
            formData.append('player', 'Guest');

            fetch('/api/scores', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            }).then(() => {
                alert("Game Over! Score: " + score);
                location.reload();
            });
        }

        let game = setInterval(draw, 100);
    </script>
</body>
</html>
